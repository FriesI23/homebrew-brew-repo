name: Build and Deploy Pages

on:
  push:
    branches: [master]
    paths:
      - "Casks/**"
      - "scripts/generate_page.rb"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate static page
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: ruby scripts/generate_page.rb "$RUNNER_TEMP/_site"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
